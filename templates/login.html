<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #13131a; --border: #222230;
    --accent: #7c6af5; --text: #e8e8f0; --muted: #6b6b80;
    --error: #f56a6a; --success: #6af5a0;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px; opacity: 0.4;
  }
  .glow {
    position: fixed; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(124,106,245,0.12) 0%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 0; pointer-events: none;
  }
  .card {
    position: relative; z-index: 1;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 48px 44px;
    width: 100%; max-width: 440px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    animation: slideUp 0.5s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
  .logo-mark {
    width: 36px; height: 36px; background: var(--accent);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: white;
  }
  .logo-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: -0.02em; }
  h1 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .field { margin-bottom: 18px; }
  label { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 13px 16px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  .btn {
    width: 100%; padding: 14px; background: var(--accent);
    color: white; border: none; border-radius: 10px;
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s; letter-spacing: 0.02em;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn.loading { opacity: 0.6; pointer-events: none; }
  .footer-link { text-align: center; margin-top: 24px; font-size: 14px; color: var(--muted); }
  .footer-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1px solid var(--border);
    padding: 12px 20px; border-radius: 10px;
    font-size: 14px; opacity: 0; transition: all 0.3s; z-index: 100; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--error); color: var(--error); }
  .toast.success { border-color: var(--success); color: var(--success); }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>

<div class="card">
  <div class="logo">
    <div class="logo-mark">I</div>
    <span class="logo-name">Inventory</span>
  </div>
  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your account</p>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" />
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()" />
  </div>

  <button class="btn" onclick="login()">Sign In</button>

  <div class="footer-link">
    Don't have an account? <a href="/register">Create one</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3000);
  }

  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) return showToast('Please fill in all fields', 'error');

    const btn = document.querySelector('.btn');
    btn.classList.add('loading'); btn.textContent = 'Signing in...';

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      localStorage.setItem('user_id', data.user_id);
      localStorage.setItem('user_name', data.name);
      showToast('Welcome back, ' + data.name + '!', 'success');
      setTimeout(() => window.location.href = '/', 1200);
    } catch(e) {
      showToast(e.message || 'Login failed', 'error');
      btn.classList.remove('loading'); btn.textContent = 'Sign In';
    }
  }
</script>
</body>
</html>
